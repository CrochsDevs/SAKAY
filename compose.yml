services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: sakay-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=SakayDB
    volumes:
      - mongodb-data:/data/db
    networks:
      - sakay-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Backend server
  sakay-server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: sakay-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/
      - DB_NAME=SakayDB
      - JWT_SECRET=${JWT_SECRET:-f47ac10b58e74ac1b6c7001438914b53ef69b6f17e2985f9e83163459c235a91}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sakay-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # React application (build stage)
  sakay-client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: sakay-client
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - client-build:/usr/share/nginx/html
    networks:
      - sakay-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx reverse proxy with SSL
  nginx-proxy:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - client-build:/usr/share/nginx/html:ro
    depends_on:
      sakay-client:
        condition: service_healthy
      sakay-server:
        condition: service_healthy
    networks:
      - sakay-network

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - sakay-network

networks:
  sakay-network:
    driver: bridge

volumes:
  client-build:
  mongodb-data:
