services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: sakay-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"  # Expose MongoDB port to host (optional)
    volumes:
      - mongodb_data:/data/db
    networks:
      - sakay-network
    environment:
      MONGO_INITDB_DATABASE: SakayDB

  # Backend server
  sakay-server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: sakay-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=mongodb://mongodb:27017/
      - DB_NAME=SakayDB
      - JWT_SECRET=${JWT_SECRET:-f47ac10b58e74ac1b6c7001438914b53ef69b6f17e2985f9e83163459c235a91}
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - sakay-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # React application
  sakay-client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    container_name: sakay-client
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://sakay-server:3000  # Add this for API calls
    networks:
      - sakay-network
    depends_on:
      sakay-server:
        condition: service_healthy

  # Nginx reverse proxy
  nginx-proxy:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      sakay-client:
        condition: service_healthy
      sakay-server:
        condition: service_healthy
    networks:
      - sakay-network

  # Certbot renewal service
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - sakay-network

networks:
  sakay-network:
    driver: bridge

volumes:
  mongodb_data:
